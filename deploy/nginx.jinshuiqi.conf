# 净水器平台 nginx 配置（HTTPS）
# 放到服务器: /etc/nginx/conf.d/jinshuiqi.conf
# 然后: nginx -t && systemctl reload nginx
#
# 证书获取(任选其一)：
#   - 阿里云免费 SSL 证书：下载 nginx 版，得到 abc.hi.cn.pem / abc.hi.cn.key
#   - Let's Encrypt: certbot --nginx -d abc.hi.cn （会自动改写本文件）
# 下面默认证书路径，按实际放置位置修改：

# HTTP → 强制跳转 HTTPS
server {
    listen 80;
    server_name abc.hi.cn;
    return 301 https://$host$request_uri;
}

# HTTPS 主站
server {
    listen 443 ssl;
    http2 on;
    server_name abc.hi.cn;

    ssl_certificate     /etc/nginx/ssl/abc.hi.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/abc.hi.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 前端静态(admin 构建产物)
    root /var/www/html/jinshuiqi;
    index index.html;

    # SPA 路由回退：非静态资源一律交给 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端接口反向代理 → NestJS(PM2 跑在本机 3100)
    # 小程序(https://abc.hi.cn/api/wx/*) 与 后台(https://abc.hi.cn/api/admin/*) 共用
    location /api/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # 静态资源缓存
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
